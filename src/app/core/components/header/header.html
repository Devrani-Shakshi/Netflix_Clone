        {{ item }}
      </li>
    </ul>
  </div>

  <!-- User Actions + Mobile Menu Toggle -->
  <div class="text-white flex items-center gap-3 md:gap-6">
    <div class="flex items-center gap-2">
      <span class="hidden sm:inline text-sm">Welcome <strong>{{ username }}</strong></span>
      <img [src]="userImg" width="38" alt="user-img" 
        class="rounded-full object-cover cursor-pointer border border-gray-700"
        (click)="toggleModal(true)" />
    </div>

    <button class="hidden md:block text-sm hover:text-gray-400 transition" (click)="auth.signOut()">Signout</button>

    <!-- Mobile Hamburger Button -->
    <button class="lg:hidden p-2 text-gray-300" (click)="toggleMobileMenu()">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path *ngIf="!isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
        <path *ngIf="isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Mobile Dropdown Menu -->
  <div *ngIf="isMenuOpen" 
    class="lg:hidden absolute top-[68px] left-0 w-full bg-gray-900 border-t border-gray-800 shadow-xl py-4 flex flex-col items-center gap-4 animate-fade-in">
    <li *ngFor="let item of navList" (click)="scrollToSection(item)"
      class="list-none text-neutral-300 cursor-pointer text-lg hover:text-white">
      {{ item }}
    </li>
    <button (click)="auth.signOut()" class="text-red-500 font-bold mt-2 border-t border-gray-800 w-3/4 pt-4">Signout</button>
  </div>
</header>

<!-- User Profile Modal -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-60 transition-opacity px-4"
  [class.hidden]="!isModalOpen">
  <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full transform transition-all scale-100">
    <h2 class="text-xl font-bold mb-4 text-gray-900">User Details</h2>
    <div class="bg-gray-50 dark:bg-gray-800 rounded-xl overflow-hidden p-6 border border-gray-100">
      <div class="text-center">
        <img class="h-24 w-24 rounded-full border-4 border-white shadow-md mx-auto mb-4 object-cover" [src]="userImg" alt="Profile" />
        <h3 class="font-bold text-xl text-gray-800 dark:text-white">{{ name }}</h3>
        <p class="text-sm text-gray-500 mb-4">{{ email }}</p>
        <div class="inline-flex text-gray-600 dark:text-gray-300 items-center text-sm">
          <svg class="h-4 w-4 mr-1" fill="currentColor" viewBox="0 0 24 24"><path d="M5.64 16.36a9 9 0 1 1 12.72 0l-5.65 5.66a1 1 0 0 1-1.42 0l-5.65-5.66zm11.31-1.41a7 7 0 1 0-9.9 0L12 19.9l4.95-4.95zM12 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm0-2a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" /></svg>
          {{ hd }}
        </div>
      </div>
      <div class="flex justify-center mt-6 border-t pt-4">
        <button (click)="auth.signOut()" class="text-red-600 font-bold hover:underline">Log Out</button>
      </div>
    </div>
    <button class="mt-4 w-full bg-gray-900 text-white font-medium py-2 rounded-xl hover:bg-gray-800 transition" (click)="toggleModal(false)">
      Close
    </button>
  </div>
</div>
