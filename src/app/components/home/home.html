<app-header [userImg]="userProfilePNG" />
<ng-container *ngIf="bannerDetail$ | async as detail">
  <app-banner 
    [bannerTitle]="detail?.original_title || detail?.title" 
    [bannerOverview]="detail?.overview"
    [key]="(bannerVideo$ | async)?.results[0]?.key" />
</ng-container>

<app-movie-carousel *ngIf="movies.length" [title]="'Popular on Netflix'" [videoContents]="movies" />
<app-movie-carousel *ngIf="tvShows.length" [title]="'Trending TV shows'" [videoContents]="tvShows" />
<app-movie-carousel *ngIf="nowPlayingMovies.length" [title]="'Now Playing'" [videoContents]="nowPlayingMovies" />
<app-movie-carousel *ngIf="popularMovies.length" [title]="'Popular Movies'" [videoContents]="popularMovies" />
<app-movie-carousel *ngIf="topRatedMovies.length" [title]="'Top Rated'" [videoContents]="topRatedMovies" />
<app-movie-carousel *ngIf="upcomingMovies.length" [title]="'Upcoming Movies'" [videoContents]="upcomingMovies" />
